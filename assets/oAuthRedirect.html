<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Raider</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body{
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }
        .image-header{
            display: flex;
            flex-direction: row;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            padding-bottom: 1rem;
            img{
                height: 4.5rem;
            }
        }
        .card {
            max-width: 50vw;

            .card-header {
                text-align: center;
                font-weight: bold;
                font-size: 1.5rem;

            }
        }
    </style>
</head>

<body>
    <div class="image-header">
        <img src="https://raw.githubusercontent.com/EkoBean/Pokemon-Raider/refs/heads/google-sheets-sync/assets/images/Pokemon%20Raider_Icon.png" style="border-radius: 25%; border: solid 1.5px rgba(226, 226, 226, 0.479);" draggable="false">
        <img src="https://raw.githubusercontent.com/EkoBean/Pokemon-Raider/refs/heads/google-sheets-sync/assets/images/arrow.png" style="width: 2.5rem; height: 2.5rem;" draggable="false">
        <img src="https://raw.githubusercontent.com/EkoBean/Pokemon-Raider/refs/heads/google-sheets-sync/assets/images/Google_Sheets_logo.png" draggable="false">
    </div>
    <div class="card">
        <div class="card-header">
            Google Sheet授權成功
        </div>
        <div class="card-body">
            <p class="card-text">感謝你使用Pokemon Raider來建立野團寶可夢銀行，本頁面會在三秒後轉跳回discord頻道</p>
        </div>
        <div class="card-footer text-muted">如轉跳失敗，您可以點擊<a href="{{redirectUrl}}">此連結手動前往</a>或關閉此頁面。</div>
    </div>

</body>
<script>
    setTimeout(function () {
        window.location.href = "{{redirectUrl}}";
    }, 3000)
</script>

</html>
